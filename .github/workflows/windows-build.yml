name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'

      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Find EXE
        run: dir build /s /b *.exe

      - name: Deploy Qt dependencies
        run: |
          mkdir deploy
          copy build\Release\MemoryAllocater.exe deploy\
          windeployqt deploy\MemoryAllocater.exe

      - name: Upload EXE folder
        uses: actions/upload-artifact@v4
        with:
          name: MemoryAllocater-Windows
          path: deploy/
